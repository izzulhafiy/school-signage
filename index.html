<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>Forest City International School - Dynamic Signage</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<meta http-equiv="refresh" content="3600">
<style>
  :root {
    --bg-color: #E2E8F0;
    --header-bg: #FFFFFF; 
    --card-yellow: #FFC107;
    --card-red: #FF4B6E;
    --text-dark: #1E293B;
    --text-light: #FFFFFF;
    --fcis-blue: rgba(10, 88, 202, 0.85);
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Nunito', sans-serif; background-color: var(--bg-color); color: var(--text-dark); overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
  
  header { 
    background-color: var(--header-bg); 
    display: grid;
    grid-template-columns: 1.3fr 1.4fr 0.8fr; 
    align-items: center; 
    padding: 0 2rem; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
    z-index: 10; 
    height: 140px; 
  }

  .logo-area { display: flex; align-items: center; gap: 15px; font-size: 2rem; font-weight: 900; white-space: nowrap; }
  .school-logo { height: 70px; width: auto; object-fit: contain; }

  .weather-header-area {
    padding: 10px 0;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .datetime-area { text-align: right; }
  .time { font-size: 2.8rem; font-weight: 900; line-height: 1; color: var(--card-yellow); white-space: nowrap; }
  .date { font-size: 1.1rem; font-weight: 700; color: var(--text-dark); margin-top: 5px; }

  .main-content { display: grid; grid-template-columns: 1.6fr 1fr; gap: 1.5rem; padding: 1.5rem; flex: 1; min-height: 0; }
  .col { display: flex; flex-direction: column; gap: 1.5rem; min-height: 0; }
  .card { border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); position: relative; overflow: hidden; }
  
  .left-col .photo-section { flex: 1.4; background-color: #000; display: flex; align-items: center; justify-content: center; }
  
  .left-col .announce-section { 
    flex: 1; 
    background-color: var(--card-yellow); 
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
    align-items: center; 
    padding: 2.5rem; 
    text-align: center;
  }

  .right-col .announce-photo-section { flex: 1; background-color: #ffffff; display: flex; align-items: center; justify-content: center; }

  .drive-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
  .poster-img { object-fit: contain; background-color: #ffffff; width: 100%; height: 100%; } 
  
  .photo-label { position: absolute; bottom: 0; left: 0; background: rgba(0,0,0,0.7); color: white; padding: 0.6rem 1.2rem; font-size: 1.3rem; font-weight: 700; border-top-right-radius: 20px; z-index: 5; }
  .notice-label { bottom: 15px; left: 15px; background: var(--fcis-blue); border-radius: 30px; font-size: 1rem; padding: 0.4rem 1rem; border-top-right-radius: 30px; }

  .slide { 
    position: absolute; 
    width: 90%; 
    height: 85%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    opacity: 0; 
    transition: opacity 0.6s ease; 
  }
  .slide.active { opacity: 1; position: relative; }

  .slide-title { font-size: 3rem; font-weight: 900; margin-bottom: 0.5rem; line-height: 1.1; }
  .slide-text { font-weight: 700; color: rgba(0,0,0,0.8); line-height: 1.3; }

  .ticker-wrap { background: var(--card-red); color: var(--text-light); padding: 1.2rem 0; overflow: hidden; white-space: nowrap; flex-shrink: 0; }
  .ticker { display: inline-block; padding-left: 100%; animation: tickerAnim 40s linear infinite; font-size: 2rem; font-weight: 700; }
  @keyframes tickerAnim { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }
</style>
</head>
<body>

  <header>
    <div class="logo-area">
      <img src="https://cats-fc.org/wp-content/uploads/2025/08/cropped-png-web.png" alt="School Logo" class="school-logo">
      Forest City International School
    </div>
    <div class="weather-header-area">
      <a class="weatherwidget-io" href="https://forecast7.com/en/1d49103d74/johor-bahru/" data-label_1="FOREST CITY" data-label_2="WEATHER" data-font="Nunito" data-icons="Climacons Animated" data-days="3" data-theme="pure" data-textcolor="#1E293B" data-suncolor="#FFC107" data-mooncolor="#FFC107" data-cloudcolor="#1E293B" data-cloudfill="#FFFFFF" data-raincolor="#0A58CA" data-snowcolor="#0A58CA" style="width: 100%;">WEATHER</a>
      <script>!function(d,s,id){var js,fjs=d.getElementsByTagName(s)[0];if(!d.getElementById(id)){js=d.createElement(s);js.id=id;js.src='https://weatherwidget.io/js/widget.min.js';fjs.parentNode.insertBefore(js,fjs);}}(document,'script','weatherwidget-io-js');</script>
    </div>
    <div class="datetime-area">
      <div class="time" id="time">00:00:00 AM</div>
      <div class="date" id="date">Loading...</div>
    </div>
  </header>

  <div class="main-content">
    <div class="col left-col">
      <div class="card photo-section">
        <img id="featured-image" class="drive-img" src="" style="display: none;">
        <div id="video-wrapper" style="display:none; width: 100%; height: 100%; background: #000;">
            <div id="featured-video"></div>
        </div>
        <div class="photo-label">📸 Featured Moment</div>
      </div>

      <div class="card announce-section" id="announce-slider-container"></div>
    </div>

    <div class="col right-col">
      <div class="card announce-photo-section">
        <img id="announce-slide-img" class="drive-img poster-img" src="" style="opacity: 0; transition: opacity 0.8s ease-in-out;">
        <div class="photo-label notice-label">📌 Notice Board</div>
      </div>
    </div>
  </div>

  <div class="ticker-wrap">
    <div class="ticker" id="dynamic-ticker"></div>
  </div>

<script>
    // 12-HOUR CLOCK SETTING
    function updateDateTime() {
      const now = new Date();
      // Changed hour12 to true
      document.getElementById("time").textContent = now.toLocaleTimeString('en-US', { 
        hour: '2-digit', 
        minute: '2-digit', 
        second: '2-digit', 
        hour12: true 
      });
      document.getElementById("date").textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    }
    setInterval(updateDateTime, 1000);
    updateDateTime();

    // AUTO-FIT FONT SIZE LOGIC
    function getFitFontSize(textLength) {
      if (textLength < 60) return "2.8rem";
      if (textLength < 160) return "2.2rem";
      if (textLength < 320) return "1.7rem";
      if (textLength < 500) return "1.4rem";
      return "1.2rem";
    }

    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwek6QDBjswaVpqEDDkMnIJs092eqkQxSXPmOd1kGWJQ2-wykIxs4QfoRyFVcV0uYo/exec"; 
    let globalData = { announceImages: [], announcements: [], tickerItems: [], mediaItems: [] };
    let announceImgIndex = 0, sheetTextIndex = 0, mediaIndex = 0;
    let cycleTimer, videoFailsafe;

    async function fetchMasterData() {
      try {
        const response = await fetch(WEB_APP_URL);
        globalData = await response.json();
        if (globalData.mediaItems?.length > 0) playNextMedia();
        if (globalData.announceImages?.length > 0) {
            cycleAnnounceImage();
            setInterval(cycleAnnounceImage, 20000); 
        }
        if (globalData.announcements?.length > 0) {
          buildSheetSlider();
          setInterval(cycleSheetText, 8000);
        }
        if (globalData.tickerItems?.length > 0) buildTicker();
      } catch (e) { console.error(e); }
    }

    let ytPlayer, isYtReady = false;
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    function onYouTubeIframeAPIReady() {
      ytPlayer = new YT.Player('featured-video', {
        height: '100%', width: '100%', host: 'https://www.youtube-nocookie.com',
        playerVars: { 'autoplay': 1, 'controls': 0, 'mute': 1, 'modestbranding': 1, 'rel': 0, 'playsinline': 1, 'origin': window.location.origin },
        events: {
          'onReady': () => { isYtReady = true; },
          'onStateChange': (e) => { 
            if (e.data === YT.PlayerState.ENDED) nextMedia();
            if (e.data === YT.PlayerState.PLAYING) clearTimeout(videoFailsafe);
          },
          'onError': () => nextMedia()
        }
      });
    }

    function playNextMedia() {
      clearTimeout(cycleTimer); clearTimeout(videoFailsafe);
      const current = globalData.mediaItems[mediaIndex];
      const imgElement = document.getElementById("featured-image");
      const vidWrapper = document.getElementById("video-wrapper");

      if (current.type === "video") {
        imgElement.style.display = "none";
        vidWrapper.style.display = "block";
        if (isYtReady && ytPlayer?.loadVideoById) {
            ytPlayer.loadVideoById(extractID(current.url));
            videoFailsafe = setTimeout(nextMedia, 15000);
        } else { setTimeout(playNextMedia, 1000); }
      } else {
        vidWrapper.style.display = "none";
        if (ytPlayer?.pauseVideo) ytPlayer.pauseVideo();
        imgElement.style.display = "block";
        imgElement.src = current.url;
        cycleTimer = setTimeout(nextMedia, 12000);
      }
    }

    function nextMedia() {
      mediaIndex = (mediaIndex + 1) % globalData.mediaItems.length;
      playNextMedia();
    }

    function extractID(url) {
      const regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
      const match = url.match(regExp);
      return (match && match[7].length == 11) ? match[7] : url;
    }

    function cycleAnnounceImage() {
      const imgEl = document.getElementById("announce-slide-img");
      if (!globalData.announceImages.length) return;
      imgEl.style.opacity = 0;
      setTimeout(() => {
        imgEl.src = globalData.announceImages[announceImgIndex];
        imgEl.onload = () => { imgEl.style.opacity = 1; };
        announceImgIndex = (announceImgIndex + 1) % globalData.announceImages.length;
      }, 800);
    }

    function buildSheetSlider() {
      const container = document.getElementById("announce-slider-container");
      container.innerHTML = ""; 
      globalData.announcements.forEach((ann, idx) => {
        const slide = document.createElement("div");
        slide.className = `slide ${idx === 0 ? 'active' : ''}`;
        const dynamicSize = getFitFontSize(ann.text.length);
        slide.innerHTML = `
          <div class="slide-title">${ann.emoji} ${ann.title}</div>
          <div class="slide-text" style="font-size: ${dynamicSize}">${ann.text}</div>
        `;
        container.appendChild(slide);
      });
    }

    function cycleSheetText() {
      const slides = document.querySelectorAll("#announce-slider-container .slide");
      if(!slides.length) return;
      slides[sheetTextIndex].classList.remove("active");
      sheetTextIndex = (sheetTextIndex + 1) % slides.length;
      slides[sheetTextIndex].classList.add("active");
    }

    function buildTicker() {
      const tickerContainer = document.getElementById("dynamic-ticker");
      tickerContainer.innerHTML = ""; 
      globalData.tickerItems.forEach(item => {
        const span = document.createElement("span");
        span.style.marginRight = "5rem";
        span.innerHTML = `<strong style="color: var(--card-yellow)">${item.category}:</strong> ${item.message}`;
        tickerContainer.appendChild(span);
      });
    }

    fetchMasterData();
</script>
</body>
</html>
